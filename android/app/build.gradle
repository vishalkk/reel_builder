plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.applicationName.companyName"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.applicationName.companyName"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    flavorDimensions += "app"

    productFlavors {
        dev {
            dimension = "app"
            applicationId = "com.applicationName.companyName.dev"
            resValue "string", "app_name", "MyApp Dev"
        }
        uat {
            dimension = "app"
            applicationId = "com.applicationName.companyName.uat"
            resValue "string", "app_name", "MyApp UAT"
        }
        prod {
            dimension = "app"
            applicationId = "com.applicationName.companyName"
            resValue "string", "app_name", "MyApp"
        }
    }
}

flutter {
    source = "../.."
}
